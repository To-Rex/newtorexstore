# Torex Local Store — Cargo config
#
# IMPORTANT: This project requires the rustup-managed toolchain.
# Homebrew's rustc lacks the iOS/Android cross-compilation standard libraries.
#
# If you have both Homebrew and rustup installed, set RUSTC explicitly:
#   export RUSTC=$(rustup which rustc)
# Or add ~/.cargo/bin to PATH before /opt/homebrew/bin in your shell profile.

# ── iOS Simulator (Apple Silicon) ──────────────────────────────────────────
[target.aarch64-apple-ios-sim]
rustflags = []

# ── iOS Simulator (Intel) ──────────────────────────────────────────────────
[target.x86_64-apple-ios]
rustflags = []

# ── iOS Device ─────────────────────────────────────────────────────────────
[target.aarch64-apple-ios]
rustflags = []

# ── Android ────────────────────────────────────────────────────────────────
[target.aarch64-linux-android]
linker = "aarch64-linux-android-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android-clang"
